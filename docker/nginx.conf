server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 50m;

    # Proxy all backend API paths to uvicorn.
    # proxy_buffering off is required for the /runs SSE stream.
    location ~ ^/(threads|runs|assistants|sources|artifacts|files|mirror|auth|google_auth|info|health) {
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
    }

    # SPA fallback — all other paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
