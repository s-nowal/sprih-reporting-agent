services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"   # FastAPI backend
      - "80:80"        # Vue frontend (nginx)
    environment:
      SPRIH_DB_HOST: mariadb
      SPRIH_DB_PORT: 3306
      SPRIH_DB_NAME: esg
      SPRIH_DB_USER: root
      SPRIH_DB_PASSWORD: dev
      SPRIH_AUTH_DEV_MODE: "true"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SERPER_API_KEY: ${SERPER_API_KEY:-}
    depends_on:
      mariadb:
        condition: service_healthy
    volumes:
      - app_storage:/app/sandbox-reporting_module/data/s3
    restart: unless-stopped

  mariadb:
    image: mariadb:11
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: dev
      MYSQL_DATABASE: esg
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-uroot", "-pdev"]
      interval: 10s
      timeout: 5s
      retries: 10

  # neo4j:
  #   image: neo4j:5
  #   ports:
  #     - "7474:7474"
  #     - "7687:7687"
  #   environment:
  #     NEO4J_AUTH: neo4j/devpassword
  #   volumes:
  #     - neo4j_data:/data

  # qdrant:
  #   image: qdrant/qdrant:latest
  #   ports:
  #     - "6333:6333"
  #     - "6334:6334"
  #   volumes:
  #     - qdrant_data:/qdrant/storage

  open-terminal:
    image: ghcr.io/open-webui/open-terminal
    container_name: open-terminal
    restart: unless-stopped
    ports:
      - "8080:8000"   # host 8080 → container 8000 (avoids clash with FastAPI)
    volumes:
      - open-terminal:/home/user
    environment:
      OPEN_TERMINAL_API_KEY: your-secret-key

volumes:
  app_storage:
  mariadb_data:
  neo4j_data:
  qdrant_data:
  open-terminal:
