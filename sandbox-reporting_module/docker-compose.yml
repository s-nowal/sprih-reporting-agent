services:
  mariadb:
    image: mariadb:11
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: dev
      MYSQL_DATABASE: esg
    volumes:
      - mariadb_data:/var/lib/mysql

  # neo4j:
  #   image: neo4j:5
  #   ports:
  #     - "7474:7474"
  #     - "7687:7687"
  #   environment:
  #     NEO4J_AUTH: neo4j/devpassword
  #   volumes:
  #     - neo4j_data:/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  open-terminal:
    image: ghcr.io/open-webui/open-terminal
    container_name: open-terminal
    restart: unless-stopped
    ports:
      - "8080:8000"
    volumes:
      - open-terminal:/home/user
    environment:
      OPEN_TERMINAL_API_KEY: your-secret-key

volumes:
  mariadb_data:
  neo4j_data:
  qdrant_data:
  open-terminal:
